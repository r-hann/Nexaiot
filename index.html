<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexaIoT Login</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0c10;
  --card:#171b25;
  --border:rgba(255,255,255,0.08);
  --accent:#00d4aa;
  --accent2:#0099ff;
  --text:#e8eaf0;
  --text2:#8b91a8;
  --danger:#ef4444;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Space Grotesk',sans-serif;
  background:
  radial-gradient(circle at top left, rgba(0,212,170,0.15), transparent 30%),
  radial-gradient(circle at bottom right, rgba(0,153,255,0.15), transparent 30%),
  var(--bg);

  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
}

.container{
  width:100%;
  max-width:430px;
  padding:20px;
}

.card{
  background:rgba(23,27,37,0.95);
  border:1px solid var(--border);
  border-radius:24px;
  padding:38px 30px;
  backdrop-filter:blur(16px);
}

.logo{
  text-align:center;
  margin-bottom:30px;
}

.logo h1{
  font-size:34px;
  margin-bottom:8px;
}

.logo p{
  color:var(--text2);
  font-size:13px;
  letter-spacing:2px;
}

.tabs{
  display:flex;
  margin-bottom:24px;
  background:#0f131b;
  border-radius:14px;
  padding:5px;
}

.tab{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  font-weight:600;
}

.tab.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;
}

.form{
  display:none;
}

.form.active{
  display:block;
}

.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  color:var(--text2);
  font-size:13px;
}

.form-input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0f131b;
  color:var(--text);
  outline:none;
}

.form-input:focus{
  border-color:var(--accent);
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}

.message{
  margin-bottom:18px;
  padding:12px;
  border-radius:12px;
  display:none;
  font-size:13px;
}

.error{
  background:rgba(239,68,68,0.12);
  color:#ff8a8a;
}

.success{
  background:rgba(0,212,170,0.12);
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="logo">
      <h1>NexaIoT</h1>
      <p>SMART MONITORING PLATFORM</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">
        Login
      </button>

      <button class="tab" onclick="switchTab('register')">
        Register
      </button>
    </div>

    <div class="message error" id="errorBox"></div>
    <div class="message success" id="successBox"></div>

    <!-- LOGIN -->
    <form id="loginForm" class="form active">

      <div class="form-group">
        <label>Username</label>

        <input
          type="text"
          id="loginUsername"
          class="form-input"
          required
        >
      </div>

      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          id="loginPassword"
          class="form-input"
          required
        >
      </div>

      <button class="btn" type="submit">
        Login
      </button>

    </form>

    <!-- REGISTER -->
    <form id="registerForm" class="form">

      <div class="form-group">
        <label>Username</label>

        <input
          type="text"
          id="registerUsername"
          class="form-input"
          required
        >
      </div>

      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          id="registerPassword"
          class="form-input"
          required
        >
      </div>

      <button class="btn" type="submit">
        Register
      </button>

    </form>

  </div>

</div>

<script src="config.js"></script>
<script src="api.js"></script>

<script>
const SCRIPT_URL =
window.NEXAIOT.config.APPS_SCRIPT_URL;

function switchTab(tab){

  document
  .querySelectorAll('.tab')
  .forEach(el => el.classList.remove('active'));

  document
  .querySelectorAll('.form')
  .forEach(el => el.classList.remove('active'));

  if(tab === 'login'){
    document
    .querySelectorAll('.tab')[0]
    .classList.add('active');

    document
    .getElementById('loginForm')
    .classList.add('active');
  }

  if(tab === 'register'){
    document
    .querySelectorAll('.tab')[1]
    .classList.add('active');

    document
    .getElementById('registerForm')
    .classList.add('active');
  }
}

function showError(msg){
  const el = document.getElementById('errorBox');
  el.innerText = msg;
  el.style.display = 'block';

  document.getElementById('successBox')
  .style.display = 'none';
}

function showSuccess(msg){
  const el = document.getElementById('successBox');
  el.innerText = msg;
  el.style.display = 'block';

  document.getElementById('errorBox')
  .style.display = 'none';
}

async function apiRequest(data){

  const res = await fetch(SCRIPT_URL,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify(data)
  });

  return res.json();
}

/* REGISTER */
document
.getElementById('registerForm')
.addEventListener('submit', async (e)=>{

  e.preventDefault();

  const username =
  document.getElementById('registerUsername').value.trim();

  const password =
  document.getElementById('registerPassword').value.trim();

  try{

    const res = await apiRequest({
      action:'register',
      username,
      password
    });

    if(res.success){

      showSuccess('Register berhasil!');

      switchTab('login');

    }else{
      showError(res.message);
    }

  }catch(err){
    showError('Server error');
  }

});

/* LOGIN */
document
.getElementById('loginForm')
.addEventListener('submit', async (e)=>{

  e.preventDefault();

  const username =
  document.getElementById('loginUsername').value.trim();

  const password =
  document.getElementById('loginPassword').value.trim();

  try{

    const res = await apiRequest({
      action:'login',
      username,
      password
    });

    if(res.success){

      localStorage.setItem(
        'nexa_user',
        JSON.stringify(res.user)
      );

      window.location.href = 'dashboard.html';

    }else{
      showError('Username atau password salah');
    }

  }catch(err){
    showError('Server error');
  }

});
</script>

</body>
</html>
