<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexaIoT Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0c10;
      --bg2:#11141c;
      --card:#171b25;
      --border:rgba(255,255,255,0.08);
      --accent:#00d4aa;
      --accent2:#0099ff;
      --text:#e8eaf0;
      --text2:#8b91a8;
      --danger:#ef4444;
      --radius:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Space Grotesk',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,212,170,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,153,255,0.12), transparent 30%),
        var(--bg);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:var(--text);
      overflow:hidden;
    }

    .login-container{
      width:100%;
      max-width:420px;
      padding:24px;
    }

    .login-card{
      background:rgba(23,27,37,0.95);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:40px 32px;
      backdrop-filter:blur(14px);
      box-shadow:
        0 0 30px rgba(0,0,0,0.4),
        0 0 80px rgba(0,212,170,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:32px;
    }

    .logo-icon{
      width:52px;
      height:52px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:700;
      color:#000;
    }

    .logo-text h1{
      font-size:28px;
      font-weight:700;
      line-height:1;
    }

    .logo-text p{
      color:var(--text2);
      font-size:13px;
      margin-top:6px;
      letter-spacing:2px;
    }

    .login-title{
      font-size:24px;
      font-weight:700;
      margin-bottom:8px;
    }

    .login-subtitle{
      color:var(--text2);
      font-size:14px;
      margin-bottom:28px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      color:var(--text2);
    }

    .form-input{
      width:100%;
      background:var(--bg2);
      border:1px solid var(--border);
      color:var(--text);
      padding:14px 16px;
      border-radius:12px;
      outline:none;
      transition:0.2s;
      font-size:14px;
    }

    .form-input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(0,212,170,0.15);
    }

    .login-btn{
      width:100%;
      border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#000;
      padding:14px;
      border-radius:12px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:0.2s;
      margin-top:10px;
    }

    .login-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.05);
    }

    .error-message{
      background:rgba(239,68,68,0.12);
      border:1px solid rgba(239,68,68,0.2);
      color:#ff8a8a;
      padding:12px;
      border-radius:10px;
      margin-bottom:18px;
      display:none;
      font-size:13px;
    }

    .footer{
      margin-top:28px;
      text-align:center;
      color:var(--text2);
      font-size:12px;
    }

    .loading{
      opacity:0.7;
      pointer-events:none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">

      <div class="logo">
        <div class="logo-icon">N</div>

        <div class="logo-text">
          <h1>NexaIoT</h1>
          <p>SMART PLATFORM v2.0</p>
        </div>
      </div>

      <div class="login-title">
        Welcome Back
      </div>

      <div class="login-subtitle">
        Login untuk mengakses dashboard monitoring IoT
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">

        <div class="form-group">
          <label class="form-label">Username</label>

          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Masukkan username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>

          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Masukkan password"
            required
          />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Login ke Dashboard
        </button>

      </form>

      <div class="footer">
        NexaIoT Monitoring System © 2026
      </div>

    </div>
  </div>

  <!-- CONFIG -->
  <script src="config.js"></script>

  <!-- API -->
  <script src="api.js"></script>

  <!-- AUTH -->
  <script src="auth.js"></script>

  <script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      errorMessage.style.display = 'none';

      loginBtn.innerText = 'Logging in...';
      loginBtn.classList.add('loading');

      try {

        const user = await Auth.login(username, password);

        localStorage.setItem('nexa_user', JSON.stringify(user));

        window.location.href = 'dashboard.html';

      } catch(err){

        errorMessage.innerText = err.message || 'Login gagal';
        errorMessage.style.display = 'block';

      } finally {

        loginBtn.innerText = 'Login ke Dashboard';
        loginBtn.classList.remove('loading');

      }
    });
  </script>

</body>
</html>
